<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} · {{ site.title }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'\\[',right:'\\]',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false}]})">
</script>
  <style>
    body { max-width: 660px; margin: 60px auto; padding: 0 20px; font-family: serif; line-height: 1.8; }
    a    { color: #333; }
    pre  { background: #f5f5f5; padding: 12px; overflow-x: auto; }
    code { font-size: 0.9em; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ddd; padding: 6px 12px; text-align: left; }
    th { background: #f5f5f5; }
    .comments-section {margin-top: 3rem;padding-top: 1.5rem;border-top: 1px solid #eee;}
  </style>
</head>
<body>
  {% unless page.url == "/" %}
  <header><a href="/">← {{ site.title }}</a></header>
  {% endunless %}
  <main>{{ content }}</main>
  {% if page.comments != false and page.date %}
    <div class="comments-section">
     <script src="https://giscus.app/client.js"
        data-repo="FAuditore/FAuditore.github.io"
        data-repo-id="MDEwOlJlcG9zaXRvcnkyOTUxMjE0NDc="
        data-category="General"
        data-category-id="DIC_kwDOEZcyJ84C7gAL"
        data-mapping="pathname"
        data-strict="1"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="preferred_color_scheme"
        data-lang="en"
        data-loading="lazy"
        crossorigin="anonymous"
        async>
</script>
    </div>
  {% endif %}
</body>
</html>
